<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy Test: Business / Corporate Professional</title>
    <link rel="stylesheet" href="/diego-site/style.css"> <!-- Corrected absolute link to the main style.css in diego-site -->
    <style>
        /* General Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6; /* Light gray background */
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }
        h1, h2 {
            color: #FFC107; /* Amber/Orange for Business/Corporate */
            text-align: center;
            margin-bottom: 20px;
        }

        /* Question Specific Styling */
        .question-container {
            display: none;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .question-container.active {
            display: block;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #2c3e50;
        }
        .options label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .options label:hover {
            background-color: #eef;
            border-color: #c9ccd5;
        }
        .options input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .feedback-icons {
            margin-left: 10px;
            font-size: 1.2em;
            vertical-align: middle;
        }
        .correct-feedback {
            color: #4CAF50;
        }
        .incorrect-feedback {
            color: #f44336;
        }
        .correct-option-after-check {
            background-color: #e6ffe6;
            border-color: #4CAF50;
        }
        .wrong-selected-option-after-check {
            background-color: #ffe6e6;
            border-color: #f44336;
        }

        /* Navigation Buttons */
        .nav-buttons {
            margin-top: 30px;
            text-align: center;
        }
        .nav-buttons button {
            padding: 12px 25px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }
        .nav-buttons button:hover {
            background-color: #1976D2;
        }
        .nav-buttons button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Results Section Styling */
        .results-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
            display: none;
        }
        .results-section h2 {
            color: #2c3e50;
        }
        .score-display {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .grade-level {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Summary Table Styling */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .summary-table th {
            background-color: #f2f2f2;
            font-weight: bold;
            color: #333;
        }
        .summary-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .summary-table .correct-row {
            background-color: #e6ffe6;
        }
        .summary-table .incorrect-row {
            background-color: #ffe6e6;
        }
        .summary-table .feedback-icon {
            font-size: 1.2em;
            font-weight: bold;
            margin-left: 5px;
        }
        .summary-table .correct-icon { color: #4CAF50; }
        .summary-table .incorrect-icon { color: #f44336; }

        /* Level specific colors (for summary) */
        .level-beginner { color: #f44336; }
        .level-intermediate { color: #ffc107; }
        .level-advanced { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Literacy Test: Business / Corporate Professional 📊💼</h1>
        <p style="text-align: center; color: #555;">Test your business understanding of AI, focusing on applications, ROI, and market impact!</p>

        <div id="quiz-area">
            <!-- Questions will be injected here by JavaScript -->
        </div>

        <div class="nav-buttons">
            <button id="submit-answer-btn">Submit Answer</button>
            <button id="next-question-btn" style="display: none;">Next Question</button>
            <button id="show-results-btn" style="display: none;">Show Results</button>
        </div>

        <div id="results" class="results-section">
            <h2>Your Results</h2>
            <p class="score-display">You got <span id="score">0</span> out of 20 correct!</p>
            <p class="grade-level">Your AI Literacy Level: <span id="level"></span></p>

            <h3>Detailed Summary:</h3>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>Q#</th>
                        <th>Question</th>
                        <th>Your Answer</th>
                        <th>Correct Answer</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="summary-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Confetti.js library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script>
        const questionsData = [
            {
                qNum: 1, text: "What is a primary business value proposition of AI implementation?",
                options: {
                    a: "To eliminate all human jobs.",
                    b: "To make computers physically more attractive.",
                    c: "To automate repetitive tasks, enhance decision-making, and improve efficiency.",
                    d: "To exclusively generate new art."
                },
                ans: "c"
            },
            {
                qNum: 2, text: "For a corporate professional, what does \"AI automation\" primarily aim to achieve?",
                options: {
                    a: "To design new office stationery.",
                    b: "To streamline repetitive business processes, freeing up human staff for more complex tasks.",
                    c: "To replace all human interaction in business processes.",
                    d: "To make business software run slower."
                },
                ans: "b"
            },
            {
                qNum: 3, text: "In a sales context, how might an AI tool be used to enhance productivity?",
                options: {
                    a: "By physically knocking on doors to make sales.",
                    b: "By analyzing customer data to identify leads, personalize recommendations, or automate routine communications.",
                    c: "By replacing the sales team entirely.",
                    d: "By solely processing financial transactions."
                },
                ans: "b"
            },
            {
                qNum: 4, text: "What does \"customer experience\" (CX) mean in relation to AI-powered services?",
                options: {
                    a: "The cost of AI implementation.",
                    b: "The AI&apos;s ability to remember customer names.",
                    c: "How customers perceive and interact with an organization&apos;s AI-enabled products or services.",
                    d: "The AI model&apos;s internal processing speed."
                },
                ans: "c"
            },
            {
                qNum: 5, text: "Which of these is a common AI application in Human Resources (HR)?",
                options: {
                    a: "Managing employee lunch breaks.",
                    b: "Automatically designing office layouts.",
                    c: "Automating resume screening, personalizing learning paths, or predicting employee turnover.",
                    d: "Generating new company policies."
                },
                ans: "c"
            },
            {
                qNum: 6, text: "What is the objective of conducting a \"Return on Investment\" (ROI) analysis for an AI project?",
                options: {
                    a: "To measure how much data the AI consumes.",
                    b: "To determine how much the AI loves its job.",
                    c: "To quantify the financial benefits (returns) against the costs of developing and deploying the AI solution.",
                    d: "To find the oldest AI technology available."
                },
                ans: "c"
            },
            {
                qNum: 7, text: "In finance, how might AI contribute to fraud detection?",
                options: {
                    a: "By physically stopping fraudulent transactions.",
                    b: "By generating new financial products for customers.",
                    c: "By analyzing transaction patterns and anomalies to identify and flag suspicious activities.",
                    d: "By automating all financial reporting without human review."
                },
                ans: "c"
            },
            {
                qNum: 8, text: "What is a \"use case\" in AI development from a business perspective?",
                options: {
                    a: "The legal justification for using AI.",
                    b: "The physical casing or housing for an AI server.",
                    c: "A specific scenario or problem where AI technology can be applied to deliver business value.",
                    d: "A training dataset for a particular AI model."
                },
                ans: "c"
            },
            {
                qNum: 9, text: "What does \"AI-driven personalization\" typically enable in marketing and sales?",
                options: {
                    a: "Making all marketing messages identical for everyone.",
                    b: "Reducing the overall number of marketing campaigns.",
                    c: "Customizing content, product recommendations, and offers for individual customers based on their behavior and preferences.",
                    d: "Automated communication with customers using a generic script."
                },
                ans: "c"
            },
            {
                qNum: 10, text: "In procurement, how can AI be leveraged for \"supplier risk assessment\"?",
                options: {
                    a: "By predicting employee turnover.",
                    b: "By analyzing supplier data, news, and market trends to predict potential risks (e.g., financial instability, supply chain disruptions).",
                    c: "By automatically changing suppliers every month.",
                    d: "By replacing human procurement officers entirely."
                },
                ans: "b"
            },
            {
                qNum: 11, text: "What is \"predictive analytics\" in a business context, especially when powered by AI?",
                options: {
                    a: "Manually forecasting future events based on expert opinion.",
                    b: "Real-time monitoring of current business operations.",
                    c: "Using historical data, statistical algorithms, and machine learning techniques to identify the likelihood of future outcomes or trends.",
                    d: "Analyzing historical data to understand past events."
                },
                ans: "c"
            },
            {
                qNum: 12, text: "From a corporate services perspective, what is the value of AI in \"knowledge management\"?",
                options: {
                    a: "AI is used solely to restrict access to information.",
                    b: "AI automatically generates all new corporate knowledge.",
                    c: "AI can organize, search, and extract insights from vast amounts of internal documents and data, making information more accessible to employees.",
                    d: "AI replaces the need for human experts."
                },
                ans: "c"
            },
            {
                qNum: 13, text: "What is \"digital transformation\" in the context of integrating AI into an enterprise?",
                options: {
                    a: "Automating basic IT support tasks.",
                    b: "Converting physical documents to digital format.",
                    c: "The fundamental change in how an organization operates and delivers value, leveraging digital technologies including AI, to improve performance or reach.",
                    d: "Simply buying new AI software."
                },
                ans: "c"
            },
            {
                qNum: 14, text: "What is a \"minimum viable product\" (MVP) approach in testing new AI-powered business solutions?",
                options: {
                    a: "A product designed to have minimal impact on the market.",
                    b: "Launching a fully-featured AI product to all customers simultaneously.",
                    c: "Releasing a new AI solution with just enough features to satisfy early adopters and gather feedback for future iterations.",
                    d: "A product that uses the smallest possible AI model."
                },
                ans: "c"
            },
            {
                qNum: 15, text: "Which of these is a key factor in assessing \"vendor lock-in risk\" when adopting a proprietary AI platform?",
                options: {
                    a: "The vendor&apos;s marketing slogans.",
                    b: "The responsiveness of the vendor&apos;s technical support.",
                    c: "The difficulty and cost associated with switching to an alternative AI platform or bringing the AI solution in-house.",
                    d: "The size of the vendor&apos;s AI development team."
                },
                ans: "c"
            },
            {
                qNum: 16, text: "How can AI support \"scenario planning\" and strategic forecasting for executive leadership?",
                options: {
                    a: "By simply providing a single, definitive future prediction.",
                    b: "By automating the creation of executive presentations.",
                    c: "By analyzing complex datasets to generate plausible future scenarios, assess potential impacts, and inform strategic decisions.",
                    d: "By physically simulating future events in a virtual reality environment."
                },
                ans: "c"
            },
            {
                qNum: 17, text: "What is \"AI explainability\" (XAI) primarily valuable for in high-stakes corporate decision-making (e.g., loan applications, medical diagnosis)?",
                options: {
                    a: "To reduce the computational resources needed by the AI.",
                    b: "To make the AI model faster.",
                    c: "To provide transparency and justification for AI decisions, which is critical for trust, regulatory compliance, and managing legal or reputational risk.",
                    d: "To help the AI learn new information faster."
                },
                ans: "c"
            },
            {
                qNum: 18, text: "In the context of competitive advantage, what does \"AI-driven market segmentation\" allow businesses to do?",
                options: {
                    a: "To automate the entire marketing department.",
                    b: "To divide the market into segments that only AI can understand.",
                    c: "To identify distinct groups of customers based on AI-analyzed behavioral, demographic, or psychographic data for highly targeted strategies.",
                    d: "To enter completely new markets without any human research."
                },
                ans: "c"
            },
            {
                qNum: 19, text: "What is a \"digital twin\" in the context of AI and operational optimization in a corporate setting?",
                options: {
                    a: "Two identical AI models running side-by-side.",
                    b: "An AI system that can read and write digital documents.",
                    c: "A virtual representation of a physical object, system, or process that uses real-time data and AI to simulate, monitor, and optimize its real-world counterpart.",
                    d: "A backup copy of all corporate data."
                },
                ans: "c"
            },
            {
                qNum: 20, text: "Which of these is a key consideration for a Chief Financial Officer (CFO) when evaluating large-scale AI investments?",
                options: {
                    a: "The aesthetic quality of AI-generated images.",
                    b: "The popularity of the AI vendor on social media.",
                    c: "Clear ROI projections, cost-benefit analysis, risk assessment (e.g., implementation, ethical, security), and alignment with long-term financial strategy.",
                    d: "The number of AI algorithms a solution utilizes."
                },
                ans: "c"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        const userAnswers = [];

        const quizArea = document.getElementById('quiz-area');
        const submitAnswerBtn = document.getElementById('submit-answer-btn');
        const nextQuestionBtn = document.getElementById('next-question-btn');
        const showResultsBtn = document.getElementById('show-results-btn');
        const resultsSection = document.getElementById('results');
        const summaryTbody = document.getElementById('summary-tbody');

        function loadQuestion() {
            const qData = questionsData[currentQuestionIndex];
            quizArea.innerHTML = `
                <div class="question-container active" id="question-${qData.qNum}">
                    <p class="question-text">${qData.qNum}. ${qData.text}</p>
                    <div class="options">
                        ${Object.keys(qData.options).map(key => `
                            <label>
                                <input type="radio" name="q${qData.qNum}" value="${key}">
                                ${key.toUpperCase()}) ${qData.options[key]}
                            </label>
                        `).join('')}
                    </div>
                    <div class="feedback-message"></div>
                </div>
            `;
            submitAnswerBtn.style.display = 'block';
            nextQuestionBtn.style.display = 'none';
            showResultsBtn.style.display = 'none';
        }

        function submitAnswer() {
            const qData = questionsData[currentQuestionIndex];
            const selectedOption = document.querySelector(`input[name="q${qData.qNum}"]:checked`);
            const feedbackMessage = document.querySelector(`#question-${qData.qNum} .feedback-message`);
            const labels = document.querySelectorAll(`#question-${qData.qNum} .options label`);

            labels.forEach(label => {
                const input = label.querySelector('input');
                if (input.value === qData.ans) {
                    label.classList.add('correct-option-after-check');
                }
                input.disabled = true; // Disable all options after submission
            });

            if (selectedOption) {
                const userAnswer = selectedOption.value;
                userAnswers[currentQuestionIndex] = userAnswer;

                if (userAnswer === qData.ans) {
                    score++;
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                    feedbackMessage.innerHTML = '<span class="feedback-icons correct-feedback">✅ Correct!</span>';
                } else {
                    feedbackMessage.innerHTML = '<span class="feedback-icons incorrect-feedback">❌ Incorrect.</span>';
                    selectedOption.parentElement.classList.add('wrong-selected-option-after-check');
                }
            } else {
                userAnswers[currentQuestionIndex] = 'unanswered';
                feedbackMessage.innerHTML = '<span class="feedback-icons incorrect-feedback">❌ Unanswered.</span>';
            }
            
            submitAnswerBtn.style.display = 'none';
            if (currentQuestionIndex < questionsData.length - 1) {
                nextQuestionBtn.style.display = 'block';
            } else {
                showResultsBtn.style.display = 'block';
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsData.length) {
                loadQuestion();
            } else {
                displayResults();
            }
        }

        function displayResults() {
            quizArea.style.display = 'none';
            submitAnswerBtn.style.display = 'none';
            nextQuestionBtn.style.display = 'none';
            showResultsBtn.style.display = 'none';

            document.getElementById('score').textContent = score;

            let level = '';
            let levelColorClass = '';
            if (score <= 7) {
                level = 'Beginner 🐣';
                levelColorClass = 'level-beginner';
            } else if (score <= 14) {
                level = 'Intermediate 🧠';
                levelColorClass = 'level-intermediate';
            } else {
                level = 'Advanced 🚀';
                levelColorClass = 'level-advanced';
            }
            document.getElementById('level').textContent = level;
            document.getElementById('level').className = 'grade-level ' + levelColorClass;

            summaryTbody.innerHTML = '';
            questionsData.forEach((q, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = (userAnswer === q.ans);
                const rowClass = isCorrect ? 'correct-row' : 'incorrect-row';
                const statusIcon = isCorrect ? '<span class="feedback-icon correct-icon">✅</span>' : '<span class="feedback-icon incorrect-icon">❌</span>';

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td>${q.qNum}</td>
                    <td>${q.text}</td>
                    <td>${userAnswer !== 'unanswered' ? q.options[userAnswer] : '-'}</td>
                    <td>${q.options[q.ans]}</td>
                    <td>${statusIcon}</td>
                `;
                summaryTbody.appendChild(tr);
            });

            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        submitAnswerBtn.addEventListener('click', submitAnswer);
        nextQuestionBtn.addEventListener('click', nextQuestion);
        showResultsBtn.addEventListener('click', displayResults);

        loadQuestion(); // Load the first question when the page loads
    </script>
</body>
</html>
