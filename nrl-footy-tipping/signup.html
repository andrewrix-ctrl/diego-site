<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRL Footy Tipping – Sign Up</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      padding: 24px 28px;
      max-width: 480px;
      width: 100%;
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 4px;
      color: #111827;
    }
    p.subtitle {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 0.95rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    label {
      font-size: 0.9rem;
      color: #111827;
      display: block;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    input[type="text"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
    }
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 4px;
    }
    .checkbox-row input[type="checkbox"] {
      margin-top: 3px;
    }
    .checkbox-row label {
      margin: 0;
      font-size: 0.85rem;
      color: #374151;
    }
    .hint {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 2px;
    }
    button[type="submit"] {
      margin-top: 12px;
      background: #16a34a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button[type="submit"]:hover {
      background: #15803d;
    }
    .disclaimer {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #6b7280;
    }
    .success-message {
      display: none;
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #ecfdf3;
      color: #166534;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NRL Footy Tipping – Sign Up</h1>
    <p class="subtitle">This form feeds straight into my NRL tipping signup sheet so I can email you the weekly link and results.</p>

    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdquQakH30dz0of6NFIrDGClOpf4Hs-FJneDn8RKTml9ayrlQ/viewform?embedded=1"
      width="100%"
      height="700"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="border: none;"
    >
      Loading NRL tipping signup form…
    </iframe>

    <p class="disclaimer">
      Your details go only to Drew&apos;s NRL tipping list (first name, last name, email and your consent). Max two emails per week.
    </p>
  </div>
</body>
</html>
