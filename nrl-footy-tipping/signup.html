<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRL Footy Tipping – Sign Up</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      background: #050816;
      color: #f5f5f7;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #0e1428;
      border-radius: 0.9rem;
      padding: 1.6rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.5);
      max-width: 720px;
      width: 100%;
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 0.4rem;
      color: #f5f5f7;
    }
    p.subtitle {
      margin: 0 0 1rem;
      color: #e2e6ff;
      font-size: 0.95rem;
    }
    iframe {
      border-radius: 0.75rem;
      background: #050816;
    }
    .disclaimer {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #c4c7ff;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="card">
      <h1>NRL Footy Tipping – Sign Up</h1>
      <p class="subtitle">This form feeds straight into my NRL tipping signup sheet so I can email you the weekly link and results.</p>

      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSdquQakH30dz0of6NFIrDGClOpf4Hs-FJneDn8RKTml9ayrlQ/viewform?embedded=1"
        width="100%"
        height="700"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        style="border: none;"
      >
        Loading NRL tipping signup form…
      </iframe>

      <p class="disclaimer">
        Your details go only to Drew&apos;s NRL tipping list (first name, last name, email and your consent). Max two emails per week.
      </p>
    </div>
  </div>
</body>
</html>
